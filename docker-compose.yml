services:
  postgres:
    image: postgres:16-alpine
    container_name: steamclone_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: steamclone
      POSTGRES_PASSWORD: steamclone_dev
      POSTGRES_DB: steamclone
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U steamclone"]
      interval: 10s
      timeout: 5s
      retries: 5

  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: steamclone_pgadmin
    restart: unless-stopped
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@steamclone.dev
      PGADMIN_DEFAULT_PASSWORD: admin
    ports:
      - "5050:80"
    depends_on:
      - postgres

volumes:
  postgres_data:
